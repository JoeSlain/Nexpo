appId: com.nexpo.app
---
# Test: Locale Switching
# Tests the internationalization (i18n) locale switching functionality

- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "NEXPO"
    timeout: 60000
- scrollUntilVisible:
    element:
      id: "locale-cs-card"
    direction: DOWN
# Verify current locale display
- assertVisible:
    id: "current-locale-title"
# Test switching to Czech (cs)
- tapOn:
    id: "locale-cs-card"
- waitForAnimationToEnd
# Verify locale changed (Czech flag visible)
- assertVisible: "🇨🇿"
# Test switching to French (fr)
- tapOn:
    id: "locale-fr-card"
- waitForAnimationToEnd
# Verify locale changed (French flag visible)
- assertVisible: "🇫🇷"
# Test switching back to English (en)
- tapOn:
    id: "locale-en-card"
- waitForAnimationToEnd
# Verify locale changed back (English flag visible)
- assertVisible: "🇬🇧"
# Verify translated text example is visible
- scrollUntilVisible:
    element:
      id: "example-translated-text-title"
    direction: DOWN
- assertVisible:
    id: "example-translated-text-title"
